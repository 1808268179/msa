dataset:
  name: imagefolder
  root: /data/users/jw/data/different_camera/c2_train
  num_classes: 22

model:
  name: msanet
  backbone: resnet18
  pretrained: true
  image_size: 448
  scales: [1, 2, 4, 8]
  embed_dim: 512
  attn_dim: 256
  dropout: 0.2

train:
  epochs: 100
  batch_size: 32
  num_workers: 16
  pin_memory: true
  amp: true
  seed: 42

optimizer:
  type: sgd
  backbone_lr: 0.0002
  new_lr: 0.002
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  type: cosine
  eta_min: 1.0e-6

augmentation:
  resize: 512
  crop: 448
  hflip: 0.5

output:
  dir: ./outputs/custom_resnet18_msanet
  save_best_only: true
